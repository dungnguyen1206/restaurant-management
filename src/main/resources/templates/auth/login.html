<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phúc Viên - đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF7F2;
            font-family: 'Inter', sans-serif;
            color: #1C1209;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        .brand-gold {
            color: #C9A84C;
        }
        .auth-card {
            border: 1px solid #E8DFD0;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(28, 18, 9, 0.05);
        }
        .btn-premium-dark {
            background-color: #2C1A0E;
            color: #F5EDD8;
            border: none;
            transition: all 0.2s ease-in-out;
        }
        .btn-premium-dark:hover {
            background-color: #3E2919;
            color: #ffffff;
        }
        .form-control:focus {
            border-color: #C9A84C;
            box-shadow: 0 0 0 0.2rem rgba(201, 168, 76, 0.25);
        }
    </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-4">

<div class="text-center mb-4">
        <span class="text-uppercase tracking-wider brand-gold d-block mb-1" style="font-size: 11px; letter-spacing: 0.3em; font-weight: 600;">
            Ngon từ thịt ngọt từ xương
        </span>
    <h1 class="serif-font fw-bold text-uppercase m-0" style="letter-spacing: 0.15em; font-size: 2.2rem;">Phúc Viên</h1>
</div>

<!-- Auth Card -->
<div class="auth-card w-100" style="max-width: 420px; overflow: hidden;">
    <!-- Header Toggle Tabs (Bootstrap-styled simulated navbar) -->
    <div class="bg-light p-3 border-bottom d-flex text-center">
        <a th:href="@{/auths/login}" class="flex-grow-1 py-2 text-decoration-none text-dark fw-semibold border-bottom border-warning border-3" style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Đăng nhập</a>
        <a th:href="@{/auths/register}" class="flex-grow-1 py-2 text-decoration-none text-secondary" style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Đăng kí</a>
    </div>

    <div class="p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2 px-3 mb-3" style="font-size: 13px;">
            Tên đăng nhập hoặc mật khẩu không chính xác.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 px-3 mb-3" style="font-size: 13px;">
            Bạn đã đăng xuất thành công khỏi hệ thống.
        </div>
        <div th:if="${param.registerSuccess}"
             class="alert alert-success">
            Đăng ký thành công. Vui lòng đăng nhập.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="email" class="form-label text-uppercase text-secondary fw-semibold" style="font-size: 11px; letter-spacing: 0.5px;">Tên đăng nhập</label>
                <input type="email" class="form-control" id="email" name="username" placeholder="EX: a@gmail.com" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label text-uppercase text-secondary fw-semibold" style="font-size: 11px; letter-spacing: 0.5px;">Mật khẩu</label>
                <input type="password" class="form-control" id="password" name="password"  placeholder="Mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-premium-dark w-100 py-2.5 text-uppercase fw-semibold tracking-wider mt-3" style="font-size: 13px; letter-spacing: 1px;">
                Đăng nhập
            </button>
        </form>
    </div>


</div>

</body>
</html>
