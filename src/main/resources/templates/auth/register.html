<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phúc Viên - đăng kí tài khoản</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FAF7F2;
            font-family: 'Inter', sans-serif;
            color: #1C1209;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        .brand-gold {
            color: #C9A84C;
        }
        .auth-card {
            border: 1px solid #E8DFD0;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(28, 18, 9, 0.05);
        }
        .btn-premium-gold {
            background-color: #C9A84C;
            color: #ffffff;
            border: none;
            transition: all 0.2s ease-in-out;
        }
        .btn-premium-gold:hover {
            background-color: #A6852E;
            color: #ffffff;
        }
        .form-control:focus, .form-select:focus {
            border-color: #C9A84C;
            box-shadow: 0 0 0 0.2rem rgba(201, 168, 76, 0.25);
        }
    </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-4">

<div class="text-center mb-4">
        <span class="text-uppercase tracking-wider brand-gold d-block mb-1" style="font-size: 11px; letter-spacing: 0.3em; font-weight: 600;">
            Ngon từ thịt ngọt từ xương
        </span>
    <h1 class="serif-font fw-bold text-uppercase m-0" style="letter-spacing: 0.15em; font-size: 2.2rem;">Phúc Viên</h1>
</div>

<!-- Auth Card -->
<div class="auth-card w-100" style="max-width: 440px; overflow: hidden;">
    <!-- Header Toggle Tabs (Bootstrap-styled simulated navbar) -->
    <div class="bg-light p-3 border-bottom d-flex text-center">
        <a th:href="@{/auths/login}" class="flex-grow-1 py-2 text-decoration-none text-secondary" style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Sign In</a>
        <a th:href="@{/auths/register}" class="flex-grow-1 py-2 text-decoration-none text-dark fw-semibold border-bottom border-warning border-3" style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">Register</a>
    </div>

    <div class="p-4">

        <form th:action="@{/auths/register}" method="post" th:object="${userRegisterDTO}">

            <div class="mb-3 row ">
                <div class="mb-4 col-md-4">
                    <label for="firstName" class="form-label text-uppercase text-secondary fw-semibold" style="font-size: 11px; letter-spacing: 0.5px;">Họ</label>
                    <input type="text" class="form-control" id="firstName" th:field="*{firstName}" placeholder="e.g., Nguyễn" >
                    <div class="text-danger mt-1" style="font-size: 11px;" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">Lỗi họ tên</div>
                </div>
                <div class="mb-4 col-md-4">
                    <label for="middleName" class="form-label text-uppercase text-secondary fw-semibold" style="font-size: 11px; letter-spacing: 0.5px;">Tên đệm</label>
                    <input type="text" class="form-control" id="middleName" th:field="*{middleName}" placeholder="e.g., Phúc Anh" >
                    <div class="text-danger mt-1" style="font-size: 11px;" th:if="${#fields.hasErrors('middleName')}" th:errors="*{middleName}">Lỗi họ tên</div>
                </div>
                <div class="mb-4 col-md-4">
                    <label for="lastName" class="form-label text-uppercase text-secondary fw-semibold" style="font-size:11px; letter-spacing:.5px;">Tên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="lastName" th:field="*{lastName}" placeholder="e.g., Tuấn" required>
                    <div class="text-danger mt-1" style="font-size: 11px;" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}">Lỗi họ tên</div>
                </div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label text-uppercase text-secondary fw-semibold">Tên đăng nhập <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="username" th:field="*{username}" placeholder="alex.minh@gmail.com" required>
                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label text-uppercase text-secondary fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
                <input type="tel" class="form-control" id="phone" th:field="*{phone}" placeholder="0123456789" required>
                <div class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
            </div>


            <div class="mb-3">
                <label for="password" class="form-label text-uppercase text-secondary fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Min 6 characters" required>
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label for="confirmPassword" class="form-label text-uppercase text-secondary fw-semibold">Xác nhận mật khẩu<span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Min 6 characters" required>
                <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button type="submit" class="btn btn-premium-gold w-100 py-2.5 text-uppercase fw-semibold tracking-wider mt-3" style="font-size: 13px; letter-spacing: 1px;">
                Đăng kí
            </button>
        </form>
    </div>

    <!-- Footer link -->
    <div class="bg-light p-3 border-top text-center" style="font-size: 12px;">
        <p class="m-0 text-muted">
            Bạn đã có tài khoản
            <a th:href="@{/auths/login}" class="brand-gold fw-semibold text-decoration-underline">Về trang đăng nhập</a>
        </p>
    </div>
</div>

</body>
</html>
