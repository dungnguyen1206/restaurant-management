<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{Waiter/layout/Layout}">
<body>
<div layout:fragment="content" class="container-fluid p-3">

    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h4 class="font-serif fw-bold mb-1" th:text="|Chi tiet don #${order.orderId}|">Chi tiet don</h4>
            <div class="text-muted small">
                <span th:text="${order.table != null ? 'Ban ' + order.table.tableNumber : 'Chua co ban'}">Ban</span>
                <span> - </span>
                <span th:text="${order.reservation != null ? order.reservation.fullName : 'Khach le'}">Khach</span>
                <span th:if="${order.reservation != null}"> - </span>
                <span th:if="${order.reservation != null}" th:text="${order.reservation.phone}">Phone</span>
            </div>
        </div>
        <a class="btn btn-gold-ghost btn-sm" th:href="@{/waiter/orders}">Quay lai</a>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-4">
            <div class="custom-card h-100">
                <div class="card-body">
                    <div class="text-muted small mb-1">Trang thai don</div>
                    <span class="badge"
                          th:classappend="${order.status.name() == 'PENDING' ? ' bg-warning text-dark' :
                                          (order.status.name() == 'PREPARING' ? ' bg-primary' :
                                          (order.status.name() == 'SERVED' ? ' bg-info text-dark' :
                                          (order.status.name() == 'COMPLETED' ? ' bg-success' : ' bg-secondary')))}"
                          th:text="${order.status}">PENDING</span>
                    <span class="badge bg-secondary ms-1" th:if="${order.submittedToKitchen != true}">Gio hang</span>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="custom-card h-100">
                <div class="card-body">
                    <div class="text-muted small mb-1">Tong tien</div>
                    <div class="fs-5 fw-bold"
                         th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') : '0'}">
                        0
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="custom-card h-100">
                <div class="card-body">
                    <div class="text-muted small mb-1">So mon</div>
                    <div class="fs-5 fw-bold" th:text="${#lists.size(orderItems)}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="custom-card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Mon</th>
                    <th class="text-center">So luong</th>
                    <th class="text-end">Don gia</th>
                    <th>Ghi chu</th>
                    <th class="text-center">Trang thai</th>
                    <th class="text-center">Thao tac</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item, iter : ${orderItems}">
                    <td class="fw-semibold" th:text="${iter.count}">1</td>
                    <td>
                        <div class="fw-semibold"
                             th:text="${item.menuItem != null ? item.menuItem.itemName : 'Mon da xoa'}">
                            Ten mon
                        </div>
                        <div class="text-muted small"
                             th:text="${item.menuItem != null and item.menuItem.category != null ? item.menuItem.category.categoryName : '-'}">
                            Danh muc
                        </div>
                    </td>
                    <td class="text-center" th:text="${item.quantity}">1</td>
                    <td class="text-end"
                        th:text="${item.unitPrice != null ? #numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT') : '0'}">
                        0
                    </td>
                    <td th:text="${item.specialNote != null and !item.specialNote.isBlank() ? item.specialNote : '-'}">-</td>
                    <td class="text-center">
                        <span class="badge"
                              th:classappend="${item.status.name() == 'PENDING' ? ' bg-warning text-dark' :
                                              (item.status.name() == 'PREPARING' ? ' bg-primary' :
                                              (item.status.name() == 'READY' ? ' bg-success' :
                                              (item.status.name() == 'SERVED' ? ' bg-info text-dark' : ' bg-secondary')))}"
                              th:text="${item.status}">PENDING</span>
                    </td>
                    <td class="text-center">
                        <form th:action="@{/waiter/orders/{orderId}/items/{orderItemId}/serve(
                                    orderId=${order.orderId},
                                    orderItemId=${item.orderItemId}
                              )}"
                              method="post">
                            <button class="btn btn-sm btn-gold-filled"
                                    type="submit"
                                    th:disabled="${item.status.name() != 'READY'}">
                                Served
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(orderItems)}">
                    <td colspan="7" class="text-center text-muted p-3">Don nay chua co mon nao</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
