<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{Waiter/layout/Layout}">
<body>
<div layout:fragment="content" class="container-fluid p-3">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h4 class="font-serif fw-bold mb-1">Ho so nhan vien</h4>
            <div class="text-muted small">Thong tin tai khoan dang dang nhap</div>
        </div>
        <a class="btn btn-gold-ghost btn-sm" th:href="@{/waiter/reservations}">Quay lai</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-4">
            <div class="custom-card shadow-sm">
                <div class="card-body text-center p-4">
                    <div class="mx-auto mb-3 waiter-avatar rounded-circle text-white d-flex align-items-center justify-content-center"
                         style="width:86px;height:86px;font-size:34px;font-weight:600;"
                         th:text="${waiter.firstName != null and !waiter.firstName.isBlank()
                                    ? #strings.substring(waiter.firstName, 0, 1)
                                    : #strings.substring(waiter.username, 0, 1)}">W</div>
                    <h5 class="mb-1"
                        th:text="${waiter.firstName + ' ' + (waiter.middleName != null and !waiter.middleName.isBlank() ? waiter.middleName + ' ' : '') + waiter.lastName}">
                        Waiter Name
                    </h5>
                    <div class="text-muted" th:text="${waiter.username}">username</div>
                    <span class="badge bg-success mt-3" th:text="${waiter.status}">ACTIVE</span>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="custom-card shadow-sm">
                <div class="card-header bg-dark text-white">
                    Thong tin ca nhan
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small mb-1">Ten dang nhap</label>
                            <div class="form-control bg-light" th:text="${waiter.username}">waiter</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small mb-1">Vai tro</label>
                            <div class="form-control bg-light"
                                 th:text="${waiter.role != null ? waiter.role.roleName : 'WAITER'}">WAITER</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small mb-1">Ho</label>
                            <div class="form-control bg-light" th:text="${waiter.firstName}">First</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small mb-1">Ten dem</label>
                            <div class="form-control bg-light" th:text="${waiter.middleName != null ? waiter.middleName : '-'}">Middle</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small mb-1">Ten</label>
                            <div class="form-control bg-light" th:text="${waiter.lastName}">Last</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small mb-1">So dien thoai</label>
                            <div class="form-control bg-light" th:text="${waiter.phone != null ? waiter.phone : '-'}">0900000000</div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small mb-1">Trang thai</label>
                            <div class="form-control bg-light" th:text="${waiter.status}">ACTIVE</div>
                        </div>
                    </div>
                </div>
            </div>

            <form th:action="@{/auths/logout}" method="post" class="mt-3">
                <button type="submit" class="btn btn-outline-danger">
                    Dang xuat
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
