<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{Waiter/layout/Layout}">
<body>
<div layout:fragment="content" class="container-fluid p-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h4 class="mb-1">Danh sach mon an</h4>
            <div class="text-muted small">Xem menu, category, gia va ton kho hien tai.</div>
        </div>
    </div>

    <form class="row g-2 mb-3" th:action="@{/waiter/menu}" method="get">
        <div class="col-md-5">
            <input type="text" class="form-control" name="keyword" placeholder="Tim mon..." th:value="${keyword}">
        </div>
        <div class="col-md-4">
            <select class="form-select" name="categoryId">
                <option value="">Tat ca category</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.categoryName}"
                        th:selected="${categoryId != null and categoryId == category.id}">
                    Category
                </option>
            </select>
        </div>
        <div class="col-md-3 d-flex gap-2">
            <button class="btn btn-primary flex-fill" type="submit">Loc</button>
            <a class="btn btn-outline-secondary" th:href="@{/waiter/menu}">Xoa</a>
        </div>
    </form>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th style="width: 90px;">Anh</th>
                    <th>Mon</th>
                    <th>Category</th>
                    <th class="text-end">Gia</th>
                    <th class="text-center">Virtual stock</th>
                    <th class="text-center">Trang thai</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${menuItemPage.content}">
                    <td>
                        <img th:if="${item.imageUrl != null and !item.imageUrl.isBlank()}"
                             th:src="${item.imageUrl}"
                             class="rounded"
                             style="width:72px;height:52px;object-fit:cover;"
                             alt="">
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${item.itemName}">Ten mon</div>
                        <div class="text-muted small" th:text="${item.description}">Mo ta</div>
                    </td>
                    <td th:text="${item.category != null ? item.category.categoryName : '-'}">Category</td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}">0</td>
                    <td class="text-center" th:text="${item.virtualInStock != null ? item.virtualInStock : 0}">0</td>
                    <td class="text-center">
                        <span class="badge"
                              th:classappend="${item.virtualInStock != null and item.virtualInStock > 0 and !item.isSoldOut} ? ' bg-success' : ' bg-danger'"
                              th:text="${item.virtualInStock != null and item.virtualInStock > 0 and !item.isSoldOut ? 'Con mon' : 'Het mon'}">
                            Con mon
                        </span>
                    </td>
                </tr>
                <tr th:if="${menuItemPage.empty}">
                    <td colspan="6" class="text-center text-muted p-3">Khong co mon phu hop</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav class="mt-3" th:if="${menuItemPage.totalPages > 1}">
        <ul class="pagination justify-content-end mb-0">
            <li class="page-item" th:classappend="${menuItemPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/waiter/menu(page=${menuItemPage.number - 1}, size=${menuItemPage.size}, keyword=${keyword}, categoryId=${categoryId})}">
                    Truoc
                </a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, menuItemPage.totalPages - 1)}"
                th:classappend="${i == menuItemPage.number} ? 'active'">
                <a class="page-link"
                   th:text="${i + 1}"
                   th:href="@{/waiter/menu(page=${i}, size=${menuItemPage.size}, keyword=${keyword}, categoryId=${categoryId})}">
                    1
                </a>
            </li>
            <li class="page-item" th:classappend="${menuItemPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/waiter/menu(page=${menuItemPage.number + 1}, size=${menuItemPage.size}, keyword=${keyword}, categoryId=${categoryId})}">
                    Sau
                </a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
