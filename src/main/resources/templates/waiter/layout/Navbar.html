<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Navbar</title>
</head>
<body>
<nav th:fragment="navbar" class="waiter-sidebar min-vh-100 p-3 d-flex flex-column">
    <div class="mb-4 px-1">
        <div class="waiter-sidebar-title">Nhan vien phuc vu</div>
    </div>

    <ul class="nav flex-column gap-1 flex-grow-1">
        <li class="nav-item">
            <a class="nav-link waiter-nav-link rounded px-3 py-2" th:href="@{/waiter/reservations}">
                <i class="fa-regular fa-calendar-check me-2"></i>Dat ban
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link waiter-nav-link rounded px-3 py-2" th:href="@{/waiter/orders}">
                <i class="fa-solid fa-receipt me-2"></i>Don hang
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link waiter-nav-link rounded px-3 py-2" th:href="@{/waiter/profile}">
                <i class="fa-regular fa-user me-2"></i>Ho so
            </a>
        </li>
    </ul>

    <hr>

    <ul class="nav flex-column gap-1">
        <li class="nav-item">
            <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
               th:href="@{/waiter/profile}">
                <div class="waiter-avatar rounded-circle text-white d-flex align-items-center justify-content-center fw-bold"
                     th:text="${#authentication.principal.user.firstName != null and !#authentication.principal.user.firstName.isBlank()
                                ? #strings.substring(#authentication.principal.user.firstName, 0, 1)
                                : #strings.substring(#authentication.principal.user.username, 0, 1)}">N</div>
                <div>
                    <div class="small fw-semibold"
                         th:text="${#authentication.principal.user.firstName + ' ' + #authentication.principal.user.lastName}">
                        Waiter Name
                    </div>
                    <div class="small text-muted">Waiter</div>
                </div>
            </a>
        </li>
        <li class="nav-item">
            <form th:action="@{/auths/logout}" method="post" class="m-0">
                <button type="submit"
                        class="nav-link waiter-nav-link rounded px-3 py-2 border-0 bg-transparent w-100 text-start">
                    <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Dang xuat
                </button>
            </form>
        </li>
    </ul>
</nav>
</body>
</html>
