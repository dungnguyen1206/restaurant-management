<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>


<aside th:fragment="sidebar" id="sidebar">

    <div class="sidebar-brand">
        <span class="brand-title">Phúc Viên<br>Management Portal</span>
        <span class="brand-sub">L'HÉRITAGE</span>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}"
           th:classappend="${currentPage == 'dashboard'} ? 'active'"
           class="nav-link">
            <i class="bi bi-grid"></i> Dashboard
        </a>
        <a th:href="@{/receptionist/reservations}"
           th:classappend="${currentPage == 'reservations'} ? 'active'"
           class="nav-link">
            <i class="bi bi-calendar3"></i> Reservations
        </a>
        <a th:href="@{/receptionist/tables}"
           th:classappend="${currentPage == 'tables'} ? 'active'"
           class="nav-link">
            <i class="bi bi-diagram-3"></i> Tables
        </a>
        <a th:href="@{/receptionist/orders}"
           th:classappend="${currentPage == 'orders'} ? 'active'"
           class="nav-link">
            <i class="bi bi-receipt"></i> Orders
        </a>
        <a th:href="@{/payments}"
           th:classappend="${currentPage == 'payments'} ? 'active'"
           class="nav-link">
            <i class="bi bi-credit-card"></i> Payments
        </a>
        <a th:href="@{/waiters}"
           th:classappend="${currentPage == 'waiters'} ? 'active'"
           class="nav-link">
            <i class="bi bi-person-badge"></i> Waiters
        </a>
    </nav>

    <!-- User info at bottom -->
    <div class="sidebar-footer">
        <div class="user-avatar">LN</div>
        <div class="user-info">
            <span class="user-name" sec:authentication="name">Linh Nguyen</span>
            <span class="user-role">Lead Receptionist</span>
        </div>
    </div>

</aside>

</body>
</html>
