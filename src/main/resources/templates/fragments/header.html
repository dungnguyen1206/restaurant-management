<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg fixed-top custom-navbar">
    <div class="container-fluid d-flex align-items-center justify-content-between">

        <!-- Left: Logo & Brand -->
        <a class="navbar-brand" th:href="@{/home}">
            RROMS <span style="font-size: 0.9rem; font-weight: 400; color: #7A6248;">| TuanDungKhanhQA</span>
        </a>

        <!-- Center: Navigation Links -->
        <div class="collapse navbar-collapse justify-content-center">
            <ul class="navbar-nav gap-4">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/menu}">Thực đơn</a>
                </li>
                <li class="nav-item" th:if="${currentUser != null}">
                    <a class="nav-link" th:href="@{/customer/reservations}">Lịch đặt bàn</a>
                </li>
            </ul>
        </div>

        <!-- Đã đăng nhập: hiển thị thông báo và avatar -->
        <div class="d-flex align-items-center gap-3" th:if="${currentUser != null}">
            <button class="btn p-1 text-secondary-custom">
                <i class="fa-regular fa-bell fs-5"></i>
            </button>
            <a th:href="@{/customer/profile}" class="d-flex align-items-center gap-2 text-decoration-none" title="Hồ sơ của tôi">
                <!-- BINDING: Lấy chữ cái viết tắt từ database (Ví dụ: NVA) -->
                <div class="d-flex align-items-center justify-content-center rounded-circle text-white fw-bold avatar-circle"
                     th:text="${currentUser != null ? currentUser.initials : 'U'}">
                    NVA
                </div>
                <i class="fa-solid fa-chevron-down" style="font-size: 0.75rem; color: #7A6248;"></i>
            </a>
        </div>

        <!-- Chưa đăng nhập: hiển thị nút đăng ký và đăng nhập -->
        <div class="d-flex align-items-center gap-2" th:if="${currentUser == null}">
            <a th:href="@{/auths/register}" class="btn btn-gold-ghost px-3">
                Đăng ký
            </a>
            <a th:href="@{/auths/login}" class="btn btn-gold-filled px-3">
                Đăng nhập
            </a>
        </div>

    </div>
</nav>

</body>
</html>
