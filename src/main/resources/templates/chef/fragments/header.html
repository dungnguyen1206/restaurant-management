<header class="annam-header"
        id="kds-header"
        th:fragment="header" xmlns:th="http://www.thymeleaf.org">
    <div class="header-left">
        <div class="breadcrumbs">
            <span class="breadcrumb-item active"
                  th:text="|Xin chào, ${chefDisplayName}|">Xin chào, Chef</span>
        </div>
    </div>

    <div class="header-right">
        <div class="header-divider"></div>

        <div class="actions-container">
            <div class="account-menu" id="header-account-menu">
                <button class="user-profile"
                        id="header-profile-trigger"
                        type="button"
                        aria-haspopup="true"
                        aria-expanded="false"
                        aria-controls="accountDropdown">
                    <span class="user-info">
                        <span class="user-name" th:text="${chefDisplayName}">Chef</span>
                        <span class="user-role">Đầu bếp</span>
                    </span>
                    <span class="user-avatar" th:text="${chefInitials}" aria-hidden="true">C</span>
                </button>

                <div class="account-dropdown" id="accountDropdown" role="menu">
                    <div class="dropdown-header">
                        <p class="dropdown-name" th:text="${chefDisplayName}">Chef</p>
                        <p class="dropdown-email" th:text="${chefEmail}">chef@example.com</p>
                    </div>
                    <hr class="dropdown-divider">
                    <div class="dropdown-footer">
                        <form th:action="@{/auths/logout}" method="post">
                            <button class="logout-btn" type="submit" role="menuitem">
                                <span class="material-symbols-outlined"></span> Đăng xuất
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
