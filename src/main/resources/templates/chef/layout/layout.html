<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">An Nam KDS</title>

    <!-- Các CSS dùng chung cho toàn bộ hệ thống -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/chef/css/fragments/header.css}"/>
    <link rel="stylesheet" th:href="@{/chef/css/fragments/sidebar.css}"/>
    <link rel="stylesheet" th:href="@{/chef/css/fragments/footer.css}"/>

    <!-- Nơi các file view con tự chèn CSS riêng của nó vào đây -->
    <th:block layout:fragment="css"></th:block>
</head>
<body>
<div class="app-container">

    <!-- Giữ nguyên việc chèn sidebar và header tĩnh nếu bạn muốn, hoặc biến chúng thành fragment như cũ -->
    <aside th:replace="~{chef/fragments/sidebar :: sidebar}"></aside>

    <div class="main-workspace">

        <header th:replace="~{chef/fragments/header :: header}"></header>

        <!-- KHU VỰC THAY ĐỔI ĐỘNG: View con sẽ ghi đè vào đây -->
        <main class="content p-4" layout:fragment="content">
            <!-- Nội dung thay đổi của từng trang sẽ nằm ở đây -->
        </main>

        <footer th:replace="~{chef/fragments/footer :: footer}"></footer >

    </div>
</div>

<!-- Các Script dùng chung -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
<script th:src="@{/chef/js/header.js}"></script>

<!-- Nơi các file view con tự chèn Script riêng -->
<th:block layout:fragment="script"></th:block>

</body>
</html>
