<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{chef/layout/layout}">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Đầu Bếp</title>
    <th:block layout:fragment="css">
        <!-- Nhúng Bootstrap Icons CDN để hiển thị các biểu tượng trong card -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" th:href="@{/chef/css/dashboard.css}" />
    </th:block>
</head>
<body>

<main layout:fragment="content" class="content p-4">

    <!-- Thống kê tổng quan -->
    <div class="row g-3 mb-4">
        <!-- Đang chờ -->
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm h-100 bg-white">
                <span class="text-muted fw-bold small text-uppercase">Đang chờ</span>
                <div class="d-flex align-items-center justify-content-between mt-2">
                    <span class="display-5 fw-bold " th:text="${dashboard.pendingCount}">0</span>
                </div>
            </div>
        </div>
        <!-- Đang làm -->
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm h-100 bg-white">
                <span class="text-muted fw-bold small text-uppercase">Đang làm</span>
                <div class="d-flex align-items-center justify-content-between mt-2">
                    <span class="display-5 fw-bold" th:text="${dashboard.preparingCount}">0</span>
                </div>
            </div>
        </div>
        <!-- Đã hoàn thành hôm nay -->
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm h-100 bg-white">
                <span class="text-muted fw-bold small text-uppercase">Đã hoàn thành hôm nay</span>
                <div class="d-flex align-items-center justify-content-between mt-2">
                    <span class="display-5 fw-bold" th:text="${dashboard.completedCountToday}">0</span>
                </div>
            </div>
        </div>
        <!-- Thời gian nấu trung bình -->
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm h-100 bg-white">
                <span class="text-muted fw-bold small text-uppercase">Thời gian nấu trung bình</span>
                <div class="d-flex align-items-center justify-content-between mt-2">
                    <span class="display-5 fw-bold " th:text="${dashboard.avgCookingTimeToday}">00:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Hàng nội dung chi tiết -->
    <div class="row g-4">
        <!-- Món ăn yêu thích hôm nay -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0 h-100 bg-white">
                <div class="card-header bg-white border-0 pt-3 pb-0">
                    <h5 class="card-title fw-bold text-dark mb-0">Món ăn yêu thích hôm nay</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive" th:if="${not #lists.isEmpty(dashboard.popularItems)}">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr class="text-muted small text-uppercase" style="font-size: 11px;">
                                    <th>Món ăn</th>
                                    <th class="text-center">Số lượng đặt</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${dashboard.popularItems}">
                                    <td>
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" class="rounded-3" style="width: 48px; height: 48px; object-fit: cover;" alt="Image">
                                            <div th:if="${#strings.isEmpty(item.imageUrl)}" class="rounded-3 bg-light d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                                            </div>
                                            <span class="fw-bold text-dark" th:text="${item.itemName}">Món ăn</span>
                                        </div>
                                    </td>
                                    <td class="text-center fw-bold text-espresso fs-5" th:text="${item.totalOrdered}">0</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${#lists.isEmpty(dashboard.popularItems)}" class="text-center py-5 text-muted">
                        <span>Chưa có món ăn nào được đặt hôm nay.</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Đơn hàng mới nhất -->
        <div class="col-md-6">
            <div class="card shadow-sm border-0 h-100 bg-white">
                <div class="card-header bg-white border-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                    <h5 class="card-title fw-bold text-dark mb-0">Đơn hàng mới nhất</h5>
                    <a th:href="@{/chef/orders}" class="btn btn-sm btn-outline-primary fw-bold px-3">Chi tiết</a>
                </div>
                <div class="card-body">
                    <div class="list-group list-group-flush" th:if="${not #lists.isEmpty(dashboard.latestOrders)}">
                        <div th:each="order : ${dashboard.latestOrders}" class="list-group-item d-flex justify-content-between align-items-center px-0 py-3 border-bottom">
                            <div>
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <span class="fw-bold text-dark" th:text="'#' + ${order.orderId}">#1</span>
                                    <span class="badge bg-light text-dark border" th:text="${order.table != null ? 'Bàn ' + order.table.tableId : 'Mang về'}">Bàn 1</span>
                                </div>
                                <small class="text-muted">
                                    <span th:text="${#temporals.format(order.createdAt.atZone(T(java.time.ZoneId).of('Asia/Ho_Chi_Minh')), 'HH:mm:ss')}">10:00:00</span>
                                </small>
                            </div>
                            <div>
                                <span class="badge rounded-pill px-3 py-2 text-uppercase" 
                                      th:text="${order.status}"
                                      th:classappend="${order.status.name() == 'PENDING' ? 'bg-warning text-dark' :
                                                       (order.status.name() == 'PREPARING' ? 'bg-primary text-white' :
                                                       (order.status.name() == 'COMPLETED' ? 'bg-success text-white' : 
                                                       (order.status.name() == 'SERVED' ? 'bg-info text-white' : 'bg-secondary text-white')))}">
                                    Status
                                </span>
                            </div>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(dashboard.latestOrders)}" class="text-center py-5 text-muted">
                        <span>Không có đơn hàng nào hôm nay.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

</body>
</html>
