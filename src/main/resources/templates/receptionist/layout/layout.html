<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - L'Héritage">L'Héritage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link th:href="@{/receptionist/layout.css}" rel="stylesheet">

    <th:block layout:fragment="css"></th:block>
</head>

<body>
<div class="app-layout">

    <aside th:replace="~{receptionist/fragments/sidebar :: sidebar}"></aside>

    <div class="content-area">
        <header th:replace="~{receptionist/fragments/header :: header}"></header>

        <main class="main-content">
            <div layout:fragment="content"></div>
        </main>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<th:block layout:fragment="script"></th:block>
</body>
</html>
