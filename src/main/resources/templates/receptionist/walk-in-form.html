<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{receptionist/layout/layout}">
<head>
    <title>Walk-in</title>

    <th:block layout:fragment="css">
        <link th:href="@{/receptionist/reservations.css}" rel="stylesheet">
    </th:block>
</head>

<body>
<div layout:fragment="content">

    <div class="mb-4">
        <a th:href="@{/receptionist/tables}" class="text-decoration-none back-link">
            <i class="fa-solid fa-arrow-left me-2"></i>
            Back to Tables
        </a>

        <h1 class="page-title mt-3">Walk-in Guest</h1>
        <p class="page-subtitle">
            Create a checked-in reservation for the selected table
        </p>
    </div>

    <div class="card form-card border-0 shadow-sm">
        <div class="card-body p-4">

            <div class="alert alert-warning d-flex align-items-center gap-2 mb-4">
                <i class="fa-solid fa-chair"></i>
                <div>
                    Table
                    <strong th:text="${table.tableNumber}">T-01</strong>
                    -
                    <span th:text="${table.capacity + ' seats'}">4 seats</span>
                </div>
            </div>

            <form th:action="@{/receptionist/reservations/walk-in}" method="post" th:object="${walkIn}">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <input type="hidden" th:field="*{tableId}">

                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Middle Name</label>
                        <input type="text" th:field="*{middleName}" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="text" th:field="*{phone}" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Number of Guests</label>
                        <input type="number"
                               th:field="*{numberOfGuests}"
                               class="form-control"
                               min="1"
                               th:max="${table.capacity}"
                               required>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Note</label>
                        <textarea th:field="*{note}" class="form-control" rows="4"></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/receptionist/tables}" class="btn btn-light">
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-warning fw-semibold">
                        <i class="fa-solid fa-check me-2"></i>
                        Check In
                    </button>
                </div>
            </form>

        </div>
    </div>

</div>
</body>
</html>
