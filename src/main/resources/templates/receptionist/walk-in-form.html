<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{receptionist/layout/layout}">
<head>
    <title>Walk-in</title>

    <th:block layout:fragment="css">
        <link th:href="@{/receptionist/reservations.css}" rel="stylesheet">
    </th:block>
</head>

<body>
<div layout:fragment="content">

    <div class="mb-4">
        <a th:href="@{/receptionist/tables}" class="text-decoration-none back-link">
            <i class="fa-solid fa-arrow-left me-2"></i>
            Back to Tables
        </a>

        <h1 class="page-title mt-3">Walk-in Guest</h1>
        <p class="page-subtitle">
            Create a checked-in reservation and select available tables
        </p>
    </div>

    <div class="alert alert-danger" th:if="${error != null}" th:text="${error}">
        Error message
    </div>

    <div class="card form-card border-0 shadow-sm">
        <div class="card-body p-4">

            <form th:action="@{/receptionist/reservations/walk-in}" method="post" th:object="${walkIn}">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control">
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('firstName')}"
                             th:errors="*{firstName}">
                            First name error
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Middle Name</label>
                        <input type="text" th:field="*{middleName}" class="form-control">
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('middleName')}"
                             th:errors="*{middleName}">
                            Middle name error
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control" required>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('lastName')}"
                             th:errors="*{lastName}">
                            Last name error
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Number of Guests</label>
                        <input type="number"
                               th:field="*{numberOfGuests}"
                               class="form-control"
                               min="1"
                               required>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('numberOfGuests')}"
                             th:errors="*{numberOfGuests}">
                            Guest count error
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Available Tables</label>
                        <div class="text-danger small mb-2"
                             th:if="${#fields.hasErrors('tableIds')}"
                             th:errors="*{tableIds}">
                            Table selection error
                        </div>

                        <div class="row g-3" th:if="${availableTables != null and !#lists.isEmpty(availableTables)}">
                            <div class="col-md-4" th:each="table : ${availableTables}">
                                <label class="card border-0 shadow-sm h-100">
                                    <div class="card-body d-flex gap-3 align-items-start">
                                        <input class="form-check-input mt-1"
                                               type="checkbox"
                                               th:field="*{tableIds}"
                                               th:value="${table.tableId}">

                                        <div>
                                            <div class="fw-bold">
                                                <i class="fa-solid fa-chair me-2 text-warning"></i>
                                                <span th:text="${table.tableNumber}">T-01</span>
                                            </div>

                                            <div class="text-muted small mt-1">
                                                <span th:text="${table.capacity + ' seats'}">4 seats</span>
                                                -
                                                <span th:text="${table.area}">INDOOR</span>
                                            </div>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="alert alert-warning mt-3"
                             th:if="${availableTables == null or #lists.isEmpty(availableTables)}">
                            No available tables.
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Note</label>
                        <textarea th:field="*{note}" class="form-control" rows="4"></textarea>
                        <div class="text-danger small mt-1"
                             th:if="${#fields.hasErrors('note')}"
                             th:errors="*{note}">
                            Note error
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/receptionist/tables}" class="btn btn-light">
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-warning fw-semibold"
                            th:disabled="${availableTables == null or #lists.isEmpty(availableTables)}">
                        <i class="fa-solid fa-check me-2"></i>
                        Check In
                    </button>
                </div>
            </form>

        </div>
    </div>

</div>
</body>
</html>
