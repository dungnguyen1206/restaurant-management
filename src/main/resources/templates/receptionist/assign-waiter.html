<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{receptionist/layout/layout}">
<head>
    <title>Phân công phục vụ</title>

    <th:block layout:fragment="css">
        <link th:href="@{/receptionist/roomlist.css}" rel="stylesheet">
    </th:block>
</head>

<body>
<div layout:fragment="content">

    <div class="mb-4">
        <a th:href="@{/receptionist/tables}" class="text-decoration-none back-link">
            <i class="fa-solid fa-arrow-left me-2"></i>
            Quay lại danh sách bàn
        </a>

        <h1 class="page-title mt-3">Phân công phục vụ</h1>
        <p class="page-subtitle">Chọn nhân viên phục vụ cho bàn này</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

            <div class="alert alert-warning mb-4">
                <strong th:text="${table.tableNumber}">T-01</strong>
                -
                <span th:text="${table.status}">OCCUPIED</span>
                -
                <span th:text="${table.capacity + ' chỗ'}">4 chỗ</span>
            </div>

            <form th:action="@{/receptionist/tables/{id}/assign-waiter(id=${table.tableId})}"
                  method="post"
                  th:object="${assignWaiter}">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="mb-4">
                    <label class="form-label fw-semibold">Nhân viên phục vụ</label>

                    <select th:field="*{waiterId}" class="form-select" required>
                        <option value="">Chọn nhân viên phục vụ</option>
                        <option th:each="waiter : ${waiters}"
                                th:value="${waiter.userId}"
                                th:text="|${waiter.firstName} ${waiter.middleName} ${waiter.lastName}|">
                            Tên nhân viên phục vụ
                        </option>
                    </select>
                </div>

                <div th:if="${waiters == null or #lists.isEmpty(waiters)}"
                     class="alert alert-danger">
                    Không có nhân viên phục vụ khả dụng.
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/receptionist/tables}" class="btn btn-light">
                        Hủy
                    </a>

                    <button type="submit"
                            class="btn btn-warning fw-semibold"
                            th:disabled="${waiters == null or #lists.isEmpty(waiters)}">
                        <i class="fa-solid fa-check me-2"></i>
                        Phân công
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>
</body>
</html>
