<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${reservation.reservationId == null ? 'New Reservation' : 'Edit Reservation'}">
        Reservation Form
    </title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Bootstrap Icons: để sidebar dùng được icon nếu sidebar đang dùng bi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>

    <!-- FontAwesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- CSS layout/sidebar giống trang Tables -->
    <link th:href="@{/receptionist/roomlist.css}" rel="stylesheet"/>

    <!-- CSS riêng của Reservations -->
    <link th:href="@{/receptionist/reservations.css}" rel="stylesheet"/>
</head>

<body>

<div class="app-layout">

    <!-- Sidebar fragment -->
    <div th:replace="~{fragments/sidebar :: sidebar}" th:with="currentPage='reservations'"></div>

    <main class="main-content">

        <div class="container-fluid">

            <div class="mb-4">
                <a th:href="@{/receptionist/reservations}"
                   class="text-decoration-none back-link">
                    <i class="fa-solid fa-arrow-left me-2"></i>
                    Back to Reservations
                </a>

                <h1 class="page-title mt-3"
                    th:text="${reservation.reservationId == null ? 'New Reservation' : 'Edit Reservation'}">
                    New Reservation
                </h1>

                <p class="page-subtitle">
                    Fill in guest reservation information
                </p>
            </div>

            <div class="card form-card border-0 shadow-sm">

                <form th:action="${reservation.reservationId == null}
                                ? @{/receptionist/reservations}
                                : @{/receptionist/reservations/{id}/update(id=${reservation.reservationId})}"
                      method="post">

                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <input type="hidden"
                           name="reservationId"
                           th:value="${reservation.reservationId}">

                    <div class="row g-4">

                        <!-- Full Name -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Guest Name</label>
                            <input type="text"
                                   name="fullName"
                                   class="form-control"
                                   placeholder="Enter guest name"
                                   th:value="${reservation.fullName}"
                                   required>
                        </div>

                        <!-- Phone -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="text"
                                   name="phone"
                                   class="form-control"
                                   placeholder="Enter phone number"
                                   th:value="${reservation.phone}"
                                   required>
                        </div>

                        <!-- User ID -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">User ID</label>
                            <input type="number"
                                   name="userId"
                                   class="form-control"
                                   placeholder="Enter user ID"
                                   th:value="${reservation.userId}">
                        </div>

                        <!-- Date -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Reservation Date</label>
                            <input type="date"
                                   name="reservationDate"
                                   class="form-control"
                                   th:value="${reservation.reservationTime != null
                                   ? #temporals.format(reservation.reservationTime, 'yyyy-MM-dd')
                                   : ''}"
                                   required>
                        </div>

                        <!-- Time -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Reservation Time</label>
                            <input type="time"
                                   name="reservationTimeValue"
                                   class="form-control"
                                   th:value="${reservation.reservationTime != null
                                   ? #temporals.format(reservation.reservationTime, 'HH:mm')
                                   : ''}"
                                   required>
                        </div>

                        <!-- Status -->
                        <div class="col-12 col-md-6">
                            <label class="form-label fw-semibold">Status</label>
                            <select name="status" class="form-select">
                                <option value="PENDING"
                                        th:selected="${reservation.status == null or reservation.status == 'PENDING'}">
                                    Pending
                                </option>

                                <option value="CONFIRMED"
                                        th:selected="${reservation.status == 'CONFIRMED'}">
                                    Confirmed
                                </option>

                                <option value="CHECKED_IN"
                                        th:selected="${reservation.status == 'CHECKED_IN'}">
                                    Checked In
                                </option>

                                <option value="CANCELLED"
                                        th:selected="${reservation.status == 'CANCELLED'}">
                                    Cancelled
                                </option>
                            </select>
                        </div>

                        <!-- Note -->
                        <div class="col-12">
                            <label class="form-label fw-semibold">Note</label>
                            <textarea name="note"
                                      class="form-control"
                                      rows="4"
                                      placeholder="Guest request, table preference..."
                                      th:text="${reservation.note}"></textarea>
                        </div>

                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">

                        <a th:href="@{/receptionist/reservations}"
                           class="btn btn-light-brown">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-gold fw-semibold">
                            <i class="fa-regular fa-floppy-disk me-2"></i>
                            Save Reservation
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </main>

</div>

</body>
</html>
