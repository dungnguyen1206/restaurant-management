<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="top-header">
    <div>
        <h5 class="mb-0" th:text="${pageTitle != null ? pageTitle : 'Receptionist Portal'}">
            Receptionist Portal
        </h5>
        <small class="text-muted">L'Héritage Management Suite</small>
    </div>

    <div class="d-flex align-items-center gap-3">
        <div class="text-end">
            <strong class="d-block" sec:authentication="name">receptionist</strong>
            <small class="text-muted">Receptionist</small>
        </div>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-sm btn-outline-dark">
                <i class="fa-solid fa-right-from-bracket me-1"></i>
                Logout
            </button>
        </form>
    </div>
</header>

</body>
</html>
