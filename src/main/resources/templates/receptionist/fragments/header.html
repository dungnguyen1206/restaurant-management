<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="top-header">
    <div>
        <h5 class="mb-0"
            th:text="${pageTitle != null ? pageTitle : 'Cổng thông tin Lễ tân'}">
            Cổng thông tin Lễ tân
        </h5>

        <small class="text-muted">Hệ thống Quản lý L'Héritage</small>
    </div>

    <div class="d-flex align-items-center gap-3">
        <div class="text-end">
            <strong class="d-block"
                    sec:authentication="name">
                lễ tân
            </strong>

            <small class="text-muted">Lễ tân</small>
        </div>

        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-sm btn-outline-dark">
                <i class="fa-solid fa-right-from-bracket me-1"></i>
                Đăng xuất
            </button>
        </form>
    </div>
</header>

</body>
</html>
