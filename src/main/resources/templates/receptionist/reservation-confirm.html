<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{receptionist/layout/layout}">
<head>
    <title>Confirm Reservation</title>

    <th:block layout:fragment="css">
        <link th:href="@{/receptionist/reservations.css}" rel="stylesheet">
    </th:block>
</head>

<body>
<div layout:fragment="content">

    <div class="mb-4">
        <a th:href="@{/receptionist/reservations}" class="text-decoration-none back-link">
            <i class="fa-solid fa-arrow-left me-2"></i>
            Back to Reservations
        </a>

        <h1 class="page-title mt-3">Confirm Reservation</h1>
        <p class="page-subtitle">Select an available table for this reservation</p>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">

            <div class="alert alert-warning mb-4">
                <div>
                    <strong th:text="${reservation.fullName}">Guest Name</strong>
                    -
                    <span th:text="${reservation.phone}">Phone</span>
                </div>
                <div>
                    Guests:
                    <strong th:text="${reservation.numberOfGuests}">4</strong>
                </div>
                <div>
                    Time:
                    <strong th:text="${#temporals.format(reservation.reservationTime, 'dd/MM/yyyy HH:mm')}">
                        13/07/2026 19:00
                    </strong>
                </div>
            </div>

            <form th:action="@{/receptionist/reservations/{id}/confirm(id=${reservation.reservationId})}"
                  method="post"
                  th:object="${confirmRequest}">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <div class="mb-4">
                    <label class="form-label fw-semibold">Available Table</label>

                    <select th:field="*{tableId}" class="form-select" required>
                        <option value="">Choose table</option>
                        <option th:each="table : ${tables}"
                                th:value="${table.tableId}"
                                th:text="|${table.tableNumber} - ${table.capacity} seats - ${table.area}|">
                            T-01 - 4 seats
                        </option>
                    </select>
                </div>

                <div th:if="${tables == null or #lists.isEmpty(tables)}"
                     class="alert alert-danger">
                    No available table has enough capacity.
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/receptionist/reservations}" class="btn btn-light">
                        Cancel
                    </a>

                    <button type="submit"
                            class="btn btn-warning fw-semibold"
                            th:disabled="${tables == null or #lists.isEmpty(tables)}">
                        <i class="fa-solid fa-check me-2"></i>
                        Confirm
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>
</body>
</html>
