<!DOCTYPE html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reservations – L'Héritage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <link th:href="@{/receptionist/roomlist.css}" rel="stylesheet"/>

    <link th:href="@{/receptionist/reservations.css}" rel="stylesheet"/>
</head>

<body class="bg-light">

<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: sidebar}" th:with="currentPage='reservations'"></div>

    <main class="main-content">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-1">Reservations</h1>
                <p class="text-muted mb-0">Manage all guest reservations</p>
            </div>

            <a th:href="@{/receptionist/reservations/new}"
               class="btn btn-warning fw-semibold">
                <i class="fa-solid fa-plus me-2"></i>
                New Reservation
            </a>
        </div>

        <form th:action="@{/receptionist/reservations}"
              method="get"
              class="row g-2 mb-4">

            <div class="col-md-7">
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-magnifying-glass text-muted"></i>
                    </span>

                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           class="form-control"
                           placeholder="Search guest, phone, reservation ID..."/>
                </div>
            </div>

            <div class="col-md-3">
                <select name="status" class="form-select">
                    <option value="" th:selected="${status == null or status == ''}">
                        All Statuses
                    </option>

                    <option value="CONFIRMED" th:selected="${status == 'CONFIRMED'}">
                        Confirmed
                    </option>

                    <option value="PENDING" th:selected="${status == 'PENDING'}">
                        Pending
                    </option>

                    <option value="CHECKED_IN" th:selected="${status == 'CHECKED_IN'}">
                        Checked In
                    </option>

                    <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">
                        Cancelled
                    </option>
                </select>
            </div>

            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-dark">
                    Filter
                </button>
            </div>

        </form>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">

                        <thead class="table-warning">
                        <tr>
                            <th>Reservation ID</th>
                            <th>Guest Name</th>
                            <th>Phone</th>
                            <th>Date & Time</th>
                            <th>Guests</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="r : ${reservations}">
                            <td>
                                <span class="fw-bold text-warning-emphasis"
                                      th:text="${'#RS-' + r.reservationId}">
                                    #RS-1
                                </span>
                            </td>

                            <td>
                                <strong th:text="${r.fullName}">
                                    Nguyen Minh Hieu
                                </strong>
                            </td>

                            <td th:text="${r.phone}">
                                +84 902 334 112
                            </td>

                            <td th:text="${#temporals.format(r.reservationTime, 'MMM dd • HH:mm')}">
                                Oct 24 • 19:30
                            </td>

                            <td th:text="${r.numberOfGuests}">
                                4
                            </td>

                            <td>
                                <span class="badge rounded-pill px-3 py-2"
                                      th:classappend="
                                      ${r.status.name() == 'CONFIRMED'} ? ' bg-success-subtle text-success-emphasis' :
                                      (${r.status.name() == 'PENDING'} ? ' bg-warning-subtle text-warning-emphasis' :
                                      (${r.status.name() == 'CHECKED_IN'} ? ' bg-info-subtle text-info-emphasis' :
                                      ' bg-danger-subtle text-danger-emphasis'))"
                                      th:text="${#strings.replace(r.status.name(), '_', ' ')}">
                                    CONFIRMED
                                </span>
                            </td>

                            <div th:each="table : ${tables}" class="col-sm-6 col-lg-4 col-xl-3">

                                <div class="card h-100 border-0 shadow-sm">
                                    <div class="card-body">

                                        <div class="d-flex justify-content-between align-items-start mb-3">
                                            <h5 class="card-title fw-bold mb-0">
                                                <i class="fa-solid fa-chair me-2 text-warning"></i>
                                                <span th:text="${table.tableNumber}">T-1</span>
                                            </h5>

                                            <span class="badge rounded-pill"
                                                  th:classappend="
                      ${table.status.name() == 'AVAILABLE'} ? ' text-bg-success' :
                      (${table.status.name() == 'OCCUPIED'} ? ' text-bg-primary' :
                      (${table.status.name() == 'RESERVED'} ? ' text-bg-warning' :
                      (${table.status.name() == 'OUT_OF_SERVICE'} ? ' text-bg-danger' :
                      ' text-bg-secondary')))"
                                                  th:text="
                      ${table.status.name() == 'AVAILABLE'} ? 'Trống' :
                      (${table.status.name() == 'OCCUPIED'} ? 'Đang dùng' :
                      (${table.status.name() == 'RESERVED'} ? 'Đã đặt' :
                      (${table.status.name() == 'OUT_OF_SERVICE'} ? 'Bảo trì' :
                      table.status.name())))">
                    Trống
                </span>
                                        </div>

                                        <p class="card-text mb-2">
                                            <i class="fa-solid fa-location-dot me-2 text-danger"></i>
                                            <span th:text="
                      ${table.area.name() == 'INDOOR'} ? 'Trong nhà' :
                      (${table.area.name() == 'OUTDOOR'} ? 'Ngoài trời' :
                      (${table.area.name() == 'VIPROOM'} ? 'Phòng VIP' :
                      table.area.name()))">
                    Trong nhà
                </span>
                                        </p>

                                        <p class="card-text mb-0">
                                            <i class="fa-solid fa-users me-2 text-secondary"></i>
                                            <span th:text="${table.capacity + ' chỗ'}">4 chỗ</span>
                                        </p>

                                    </div>
                                </div>

                            </div>
                        </tr>

                        <tr th:if="${reservations == null or #lists.isEmpty(reservations)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="fa-regular fa-calendar-xmark fs-3 d-block mb-2"></i>
                                No reservations found.
                            </td>
                        </tr>

                        </tbody>

                    </table>
                </div>

            </div>
        </div>

    </main>

</div>

</body>
</html>
