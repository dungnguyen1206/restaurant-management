<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{receptionist/layout/layout}">
<head>
    <title>Thanh toán</title>

    <th:block layout:fragment="css">
        <link th:href="@{/receptionist/orders.css}" rel="stylesheet">
    </th:block>
</head>

<body>
<div layout:fragment="content">

    <div class="alert alert-danger"
         th:if="${error != null}"
         th:text="${error}">
    </div>

    <div class="mb-4">
        <a th:href="@{/receptionist/orders}" class="text-decoration-none">
            <i class="fa-solid fa-arrow-left me-2"></i>
            Quay lại đơn hàng
        </a>

        <h1 class="mt-3 fw-bold">Thanh toán</h1>
    </div>

    <div class="row g-4">

        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">

                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div>
                            <div class="text-muted small">Đơn hàng</div>
                            <h4 class="fw-bold mb-0" th:text="|#LH-${checkout.orderId}|">#LH-1</h4>
                        </div>

                        <div class="text-end">
                            <div class="text-muted small">Bàn</div>
                            <h5 class="fw-bold mb-0" th:text="${checkout.tableNumber}">T-01</h5>
                        </div>
                    </div>

                    <div class="mb-3">
                        <span class="text-muted">Nhân viên:</span>
                        <strong th:text="${checkout.username != null and checkout.username != '' ? checkout.username : 'N/A'}">
                            waiter01
                        </strong>
                    </div>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>Món</th>
                                <th class="text-center">SL</th>
                                <th class="text-end">Đơn giá</th>
                                <th class="text-end">Thành tiền</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="item : ${checkout.items}">
                                <td th:text="${item.itemName}">Phở bò</td>
                                <td class="text-center" th:text="${item.quantity}">2</td>
                                <td class="text-end"
                                    th:text="|${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')}đ|">
                                    50,000đ
                                </td>
                                <td class="text-end fw-semibold"
                                    th:text="|${#numbers.formatDecimal(item.lineTotal, 0, 'COMMA', 0, 'POINT')}đ|">
                                    100,000đ
                                </td>
                            </tr>

                            <tr th:if="${checkout.items == null or #lists.isEmpty(checkout.items)}">
                                <td colspan="4" class="text-center text-muted py-4">
                                    Không tìm thấy món.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-3">
                        <span class="fs-5 fw-semibold">Tổng tiền</span>
                        <span class="fs-4 fw-bold text-warning"
                              th:text="|${#numbers.formatDecimal(checkout.totalAmount, 0, 'COMMA', 0, 'POINT')}đ|">
                            500,000đ
                        </span>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 text-center">

                    <h5 class="fw-bold mb-3">Thanh toán VietQR</h5>

                    <img th:src="${checkout.vietQrUrl}"
                         alt="VietQR"
                         class="img-fluid border rounded mb-3"
                         style="max-width: 320px;">

                    <div class="text-muted small mb-1">Nội dung chuyển khoản</div>
                    <div class="fw-bold mb-3" th:text="${checkout.transferContent}">
                        ORDER-1
                    </div>

                    <form th:action="@{/receptionist/orders/{id}/checkout/vietqr(id=${checkout.orderId})}"
                          method="post"
                          class="mb-2">
                        <input type="hidden"
                               th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <button type="submit" class="btn btn-warning fw-semibold w-100">
                            <i class="fa-solid fa-check me-2"></i>
                            Xác nhận đã thanh toán VietQR
                        </button>
                    </form>

                    <form th:action="@{/receptionist/orders/{id}/checkout/cash(id=${checkout.orderId})}"
                          method="post">
                        <input type="hidden"
                               th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <button type="submit" class="btn btn-outline-dark fw-semibold w-100">
                            <i class="fa-solid fa-money-bill-wave me-2"></i>
                            Xác nhận đã thanh toán tiền mặt
                        </button>
                    </form>

                </div>
            </div>
        </div>

    </div>

</div>
</body>
</html>
