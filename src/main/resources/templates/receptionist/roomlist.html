<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tables – L'Héritage</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <!-- Custom CSS -->
    <link th:href="@{/receptionist/roomlist.css}" rel="stylesheet"/>
</head>

<body>

<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: sidebar}" th:with="currentPage='tables'"></div>

    <main class="main-content">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-1">Bàn</h1>
                <p class="text-muted mb-0">Quản lý danh sách bàn trong nhà hàng</p>
            </div>
        </div>

        <!-- Filter -->
        <form th:action="@{/table/list}" method="get" class="row g-2 mb-4">

            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white">
                        <i class="fa-solid fa-magnifying-glass text-muted"></i>
                    </span>

                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           class="form-control"
                           placeholder="Tìm kiếm bàn..."/>
                </div>
            </div>

            <div class="col-md-3">
                <select name="area" class="form-select filter-select">
                    <option value="" th:selected="${area == null or area == ''}">
                        Tất cả khu vực
                    </option>

                    <option value="INDOOR" th:selected="${area == 'INDOOR'}">
                        Trong nhà
                    </option>

                    <option value="OUTDOOR" th:selected="${area == 'OUTDOOR'}">
                        Ngoài trời
                    </option>

                    <option value="VIPROOM" th:selected="${area == 'VIPROOM'}">
                        Phòng VIP
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <select name="capacity" class="form-select filter-select">
                    <option value="" th:selected="${capacity == null or capacity == ''}">
                        Tất cả sức chứa
                    </option>

                    <option value="2" th:selected="${capacity == '2'}">2 chỗ</option>
                    <option value="4" th:selected="${capacity == '4'}">4 chỗ</option>
                    <option value="6" th:selected="${capacity == '6'}">6 chỗ</option>
                    <option value="8" th:selected="${capacity == '8'}">8 chỗ</option>
                </select>
            </div>

            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-dark">
                    <i class="fa-solid fa-filter me-2"></i>
                    Filter
                </button>
            </div>

        </form>

        <!-- Table cards -->
        <div class="row g-3">
            <div th:each="table : ${tables}" class="col-sm-6 col-lg-4 col-xl-3">

                <div class="card h-100 border-0 shadow-sm">
                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h5 class="card-title fw-bold mb-0">
                                <i class="fa-solid fa-chair me-2 text-warning"></i>
                                <span th:text="${table.tableNumber}">T-1</span>
                            </h5>

                            <div>
                    <span th:if="${table.status.name() == 'AVAILABLE'}"
                          class="badge rounded-pill text-bg-success">
                        Trống
                    </span>

                                <span th:if="${table.status.name() == 'OCCUPIED'}"
                                      class="badge rounded-pill text-bg-primary">
                        Đang dùng
                    </span>

                                <span th:if="${table.status.name() == 'RESERVED'}"
                                      class="badge rounded-pill text-bg-warning">
                        Đã đặt
                    </span>

                                <span th:if="${table.status.name() == 'OUT_OF_SERVICE'}"
                                      class="badge rounded-pill text-bg-danger">
                        Bảo trì
                    </span>
                            </div>
                        </div>

                        <p class="card-text mb-2">
                            <i class="fa-solid fa-location-dot me-2 text-danger"></i>

                            <span th:if="${table.area.name() == 'INDOOR'}">Trong nhà</span>
                            <span th:if="${table.area.name() == 'OUTDOOR'}">Ngoài trời</span>
                            <span th:if="${table.area.name() == 'VIPROOM'}">Phòng VIP</span>
                        </p>

                        <p class="card-text mb-0">
                            <i class="fa-solid fa-users me-2 text-secondary"></i>
                            <span th:text="${table.capacity + ' chỗ'}">4 chỗ</span>
                        </p>

                    </div>
                </div>

            </div>

            </div>

            <div th:if="${tables == null or #lists.isEmpty(tables)}" class="col-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center py-5 text-muted">
                        <i class="fa-solid fa-table-cells-large fs-1 d-block mb-3"></i>
                        Không tìm thấy bàn.
                    </div>
                </div>
            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.querySelectorAll('.filter-select').forEach(function (selectElement) {
        selectElement.addEventListener('change', function () {
            this.closest('form').submit();
        });
    });
</script>

</body>
</html>
