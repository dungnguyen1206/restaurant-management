<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container-fluid p-0">
    <div class="row min-vh-100 g-0">

        <aside class="col-md-2 bg-dark text-white d-flex flex-column" style="background-color: #2C1A0E !important;">
            <div th:insert="~{manager/fragment/sidebar::sidebar(${activeMenu})}" class="h-100"></div>
        </aside>

        <div class="col-md-10 d-flex flex-column" style="background: #FAF7F2">

            <header th:insert="~{manager/fragment/header}">

            </header>
            <hr style="margin: 0 0 !important;">
            <main layout:fragment="content" class="flex-grow-1">
            </main>

            <footer th:insert="~{manager/fragment/footer::footer}"></footer>

        </div>

    </div>
</div>
</body>
</html>
