<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sidebar</title>
    <link rel="stylesheet" th:href="@{/manager/manager-menu.css}">
    <link rel="stylesheet" th:href="@{/manager/manager-dashboard.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid p-0">
    <div class="row">
        <div class="col-md-2">
            <div th:replace="~{manager/fragment/sidebar :: sidebar('menu')}">
            </div>
        </div>

        <div class="col-md-10 py-4 ps-5 pe-4">
            <form>
            <div class="row">
                <div class="col-md-2">
                    <span style="font-size: 25px; font-family: Playfair Display;font-weight: 400">Quản lí món ăn</span>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <input class="form-control" type="text" placeholder="Tìm kiếm theo tên món ăn, mã món...">
                        <span class="input-group-text" id="basic-addon2"><i class="bi bi-search"></i></span>
                    </div>
                </div>
                <div class="col-md-4">
                    <a th:href="@{/manager/menu/add}" class="btn btn-primary" style="background: #C9A84C;border-color: #C9A84C">
                        <i class="bi bi-plus"></i>Thêm món mới
                    </a>
                </div>
                <hr style="color: #C9A84C; width: 90%; margin-top: 15px">
            </div>

<!--            nav filter content , su li bang JS-->
            <div class="row">
                <ul class="nav nav-underline" style="margin-top: 5px;">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{manager/menu/list.html}">Tất cả</a>
                    </li>
                    <li class="nav-item" th:each="category : ${categoryResponseForManagers}">
                        <a class="nav-link " href="#" th:text="${category.getCategoryName()}"></a>
                    </li>

                </ul>
                <hr style="color: #C9A84C; width: 90%;">
            </div>

<!--          card menu items      -->
              <div class="row">
                  <div class="col-md-4" th:each="menuItems : ${menus}">
                        <div class="card">
                            <div class="card-header">

                            </div>
                        </div>
                  </div>
              </div>
                </form>
        </div>
    </div>
</div>

</body>
</html>
