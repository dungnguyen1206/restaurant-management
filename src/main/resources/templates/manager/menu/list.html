<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
        layout:decorate="~{manager/fragment/layout}" th:with="activeMenu='menu'">
<head>
    <meta charset="UTF-8">
    <title>Sidebar</title>
    <link rel="stylesheet" th:href="@{/manager/manager-menu.css}">
    <link rel="stylesheet" th:href="@{/manager/manager-dashboard.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid p-0 h-100" layout:fragment="content">
    <div class="d-block w-100" style="background: #FAF7F2; min-height: 100vh;">
        <div class="w-100 py-4 ps-5 pe-4">
            <form th:action="@{/manager/menu/list}" method="get">
                <input type="hidden" name="page" th:value="${currentPage}" />
                <input type="hidden" name="categoryId" th:value="${categoryId}" />
                <div class="row">
                    <div class="col-md-2">
                        <span style="font-size: 25px; font-family: Playfair Display;font-weight: 400">Quản lí món ăn</span>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <input class="form-control" type="text" name="filterKey" th:value="${filterKey}" placeholder="Tìm kiếm theo tên món ăn, mã món...">
                            <button class="input-group-text" id="basic-addon2"><i class="bi bi-search"></i></button>
                        </div>
                    </div>
                    <div class="col-md-4" style="text-align: right;">
                        <a th:href="@{/manager/menu/create}" class="btn btn-primary"
                           style="background: #C9A84C;border-color: #C9A84C">
                            <i class="bi bi-plus"></i>Thêm món mới
                        </a>
                    </div>
                    <hr style="color: #C9A84C; width: 90%; margin-top: 15px">
                </div>

                <!--            nav filter content , su li bang JS-->
                <div class="row">
                    <ul class="nav nav-underline" style="margin-top: 5px;">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/manager/menu/list}" th:classappend="${categoryId==null} ? 'active'">Tất cả</a>
                        </li>
                        <li class="nav-item" th:each="category : ${categoryResponseForManagers}">
                            <a class="nav-link " th:href="@{/manager/menu/list(categoryId=${category.getId()})}" th:text="${category.getCategoryName()}" th:classappend="${categoryId == category.getId()} ? 'active'"></a>
                        </li>

                    </ul>
                    <hr style="color: #C9A84C; width: 90%;">
                </div>

                <!--          card menu items      -->
                <div class="row">
                    <div class="col-md-4 " th:each="menuItems : ${menuItemResponseForManagerList}">
                        <div class="card" style="width: 90%; margin-top: 5px; margin-bottom: 10px; border-color: #C9A84C">
                            <div class="row">
                                <div class="col-7 text-start" style="width: 100%;height: 180px;overflow: hidden;">
                                    <img th:src="${menuItems.getImage()}" class="card-img-top" alt="Item Image">
                                </div>
                            </div>

                            <div class="row align-items-center g-2 mx-1 mt-2">
                                <div class="col-7">
                                    <div class="text-truncate" style="font-family: Playfair Display;font-weight: 400;font-size: 20px"
                                         th:text="${menuItems.getItemName()}"
                                         th:title="${menuItems.getItemName()}">
                                    </div>
                                </div>

                                <div class="col-5 text-end">
                                    <span class="text-nowrap" style="font-family: JetBrains Mono;font-weight: 500;color: #C9A84C ;font-size: 20px;"
                                          th:text="${#numbers.formatDecimal(    menuItems.getItemPrice(),  0, 'POINT',   0, 'COMMA' ) + ' VND'}"></span>
                                </div>
                            </div>



                            <div class="row mx-1 g-2">
                                <div class="col-md-12">
                                    <span th:text="${menuItems.getItemDescription()} " style="font-family: Inter;font-size: 16px;font-weight: 400;color: #7A6248"></span>
                                </div>
                            </div>
                            <hr>
                            <div class="row">
                                <div class="col-md-12 d-flex  justify-content-center" >
                                    <a class="menu-edit-button"
                                       th:href="@{/manager/menu/update(menuItemId =${menuItems.getId()})}"><i class="bi bi-pencil"></i> Chỉnh sửa món ăn</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-12">
                            <div class="paging">
                            <span th:text="'Trang hiện tại ' + ${currentPage + 1}+ '  trong ' + ${totalPages}" style=" font-weight: 500;padding: 6px 10px ; border-radius: 5px; margin-top: 5px; margin-bottom: 5px; font-size: 14px"></span>
                                <a th:if="${currentPage!=0}"
                                        th:href="@{/manager/menu/list(page=${currentPage - 1},categoryId=${categoryId},filterKey=${filterKey})}" class="pager-button">Trước</a>
                                <span th:if="${currentPage == 0}" class="pager-button disabled"> Trước</span>

                                <a th:if="${currentPage < totalPages - 1}"
                                   th:href="@{/manager/menu/list(page=${currentPage + 1},categoryId=${categoryId},filterKey=${filterKey})}" class="pager-button">Sau</a>
                                <span th:if="${currentPage == totalPages -1}" class="pager-button disabled"> Sau</span>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
