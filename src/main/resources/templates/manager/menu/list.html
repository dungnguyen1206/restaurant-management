<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sidebar</title>
    <link rel="stylesheet" th:href="@{/manager/manager-dashboard.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container-fluid p-0">
    <div class="row">
        <div class="col-md-2">
            <div th:replace="~{manager/fragment/sidebar :: sidebar('menu')}">
            </div>
        </div>
        <div class="col-md-10 py-4 ps-5 pe-4">
            <div class="row">
                <div class="col-md-2">
                    <span style="font-size: 25px; font-family: Playfair Display;font-weight: 400">Quản lí món ăn</span>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <input class="form-control" type="text" placeholder="Tìm kiếm theo tên món ăn, mã món...">
                        <span class="input-group-text" id="basic-addon2"><i class="bi bi-search"></i></span>
                    </div>
                </div>
                <div class="col-md-4">
                    <th:block>
                        <form action="#">
                            <button class="btn btn-primary" type="submit" style="color: #2C1A0E;background: #C9A84C;border: #C9A84C;font-weight: 600"><i class="bi bi-plus"></i>Thêm món mới</button>
                        </form>
                    </th:block>
                </div>
                <hr style="color: #C9A84C; width: 90%; margin-top: 15px">
            </div>

<!--            Main content-->
            <div class="row">
                <ul class="nav nav-underline" style="margin-top: 5px">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Tất cả</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Link</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                </ul>
            </div>


        </div>
    </div>
</div>

</body>
</html>
