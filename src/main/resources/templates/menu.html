<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>RROMS - Thực đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container my-5 py-4">
    <div class="mb-4"><h1 class="font-serif fw-bold mb-1">Thực đơn nhà hàng</h1>
        <p class="font-sans text-secondary-custom">Ẩm thực Việt Nam tinh tế theo mùa</p></div>
    <ul class="nav category-nav gap-4 mb-4 border-bottom">
        <li class="nav-item"><a
                th:href="@{/menu(categoryId='',keyword=${criteriaMenuItem.keyword},soldOut=${criteriaMenuItem.soldOut},sort=${criteriaMenuItem.sort})}"
                class="nav-link" th:classappend="${criteriaMenuItem.categoryId == null} ? 'active' : ''">Tất cả</a></li>
        <li class="nav-item" th:each="cat : ${categories}"><a
                th:href="@{/menu(categoryId=${cat.categoryId},keyword=${criteriaMenuItem.keyword},soldOut=${criteriaMenuItem.soldOut},sort=${criteriaMenuItem.sort})}"
                class="nav-link" th:classappend="${criteriaMenuItem.categoryId == cat.categoryId} ? 'active' : ''"
                th:text="${cat.categoryName}"></a></li>
    </ul>
    <form th:action="@{/menu}" method="get" th:object="${criteriaMenuItem}" class="mb-5"><input type="hidden"
                                                                                                th:field="*{categoryId}">
        <div class="row g-3">
            <div class="col-md-6">
                <div class="input-group"><span class="input-group-text bg-white border-end-0 text-muted"><i
                        class="fa-solid fa-magnifying-glass"></i></span><input type="text" th:field="*{keyword}"
                                                                               class="form-control border-start-0"
                                                                               placeholder="Tìm kiếm món ăn...">
                    <button class="btn btn-outline-secondary" type="submit">Tìm kiếm</button>
                </div>
            </div>
            <div class="col-6 col-md-3"><select class="form-select" onchange="this.form.submit()" th:field="*{sort}">
                <option value="">Sắp xếp theo giá</option>
                <option value="priceAsc">Giá: thấp đến cao</option>
                <option value="priceDesc">Giá: cao đến thấp</option>
            </select></div>
            <div class="col-6 col-md-3"><select class="form-select" onchange="this.form.submit()" th:field="*{soldOut}">
                <option value="">Tất cả trạng thái</option>
                <option value="false">Còn món</option>
                <option value="true">Hết món</option>
            </select></div>
        </div>
    </form>
    <div th:if="${menuItems.isEmpty()}" class="custom-card text-center p-5"><i
            class="fa-solid fa-utensils display-5 text-muted"></i>
        <p class="mt-3 mb-0">Không tìm thấy món ăn phù hợp.</p></div>
    <div class="row g-4 row-cols-1 row-cols-md-3">
        <div class="col" th:each="menuItem : ${menuItems}">
            <div class="card custom-card overflow-hidden h-100"
                 th:classappend="${menuItem.isSoldOut} ? 'dish-card-unavailable' : ''" style="cursor:pointer"
                 data-bs-toggle="modal" th:data-bs-target="${'#dishModal-' + menuItem.itemId}">
                <div th:if="${menuItem.imageUrl == null || menuItem.imageUrl.isEmpty()}"
                     class="dish-img-placeholder d-flex align-items-center justify-content-center text-muted"><i
                        class="fa-regular fa-image fs-3"></i></div>
                <img th:if="${menuItem.imageUrl != null && !menuItem.imageUrl.isEmpty()}" th:src="${menuItem.imageUrl}"
                     alt="Hình món ăn" class="w-100" style="height:180px;object-fit:cover">
                <div class="card-body p-3 d-flex flex-column">
                    <div class="d-flex justify-content-between mb-2"><span class="badge"
                                                                           style="background:#FAF7F2;color:#7A6248"
                                                                           th:text="${menuItem.categoryName}"></span><span
                            class="badge"
                            th:styleappend="${!menuItem.isSoldOut} ? 'background:#D1FAE5;color:#065F46' : 'background:#FEE2E2;color:#991B1B'"
                            th:text="${!menuItem.isSoldOut} ? 'Còn món' : 'Hết món'"></span></div>
                    <h5 class="font-serif fw-bold mb-1" th:text="${menuItem.itemName}"></h5>
                    <p class="text-secondary-custom small mb-3" th:text="${menuItem.description}"></p>
                    <p class="font-mono text-gold fw-bold mb-0 mt-auto"
                       th:text="${#numbers.formatDecimal(menuItem.price,0,'COMMA',0,'POINT') + ' ₫'}"></p></div>
            </div>
            <div class="modal fade" th:id="${'dishModal-' + menuItem.itemId}" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content custom-card overflow-hidden">
                        <div th:if="${menuItem.imageUrl == null || menuItem.imageUrl.isEmpty()}"
                             class="dish-img-placeholder d-flex align-items-center justify-content-center text-muted"
                             style="height:240px"><i class="fa-regular fa-image fs-2"></i></div>
                        <img th:if="${menuItem.imageUrl != null && !menuItem.imageUrl.isEmpty()}"
                             th:src="${menuItem.imageUrl}" alt="Chi tiết món ăn" class="w-100"
                             style="height:240px;object-fit:cover">
                        <button type="button"
                                class="btn-close position-absolute end-0 top-0 m-3 bg-white p-2 rounded-circle"
                                data-bs-dismiss="modal" aria-label="Đóng"></button>
                        <div class="modal-body p-4">
                            <div class="d-flex justify-content-between mb-2"><span class="badge"
                                                                                   style="background:#FAF7F2;color:#7A6248"
                                                                                   th:text="${menuItem.categoryName}"></span>
                                <h4 class="font-mono text-gold fw-bold"
                                    th:text="${#numbers.formatDecimal(menuItem.price,0,'COMMA',0,'POINT') + ' ₫'}"></h4>
                            </div>
                            <h3 class="font-serif fw-bold" th:text="${menuItem.itemName}"></h3>
                            <p class="text-secondary-custom" th:text="${menuItem.description}"></p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <nav class="mt-5" th:if="${totalPages > 1}" aria-label="Phân trang thực đơn">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'"><a class="page-link"
                                                                                       th:href="@{/menu(page=${currentPage - 1},categoryId=${criteriaMenuItem.categoryId},keyword=${criteriaMenuItem.keyword},soldOut=${criteriaMenuItem.soldOut},sort=${criteriaMenuItem.sort})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(startPage,endPage)}"
                th:classappend="${currentPage == i} ? 'active'"><a class="page-link"
                                                                   th:href="@{/menu(page=${i},categoryId=${criteriaMenuItem.categoryId},keyword=${criteriaMenuItem.keyword},soldOut=${criteriaMenuItem.soldOut},sort=${criteriaMenuItem.sort})}"
                                                                   th:text="${i + 1}"></a></li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'"><a class="page-link"
                                                                                                    th:href="@{/menu(page=${currentPage + 1},categoryId=${criteriaMenuItem.categoryId},keyword=${criteriaMenuItem.keyword},soldOut=${criteriaMenuItem.soldOut},sort=${criteriaMenuItem.sort})}">Sau</a>
            </li>
        </ul>
    </nav>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
