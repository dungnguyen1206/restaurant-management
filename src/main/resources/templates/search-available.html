<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RROMS - Chọn bàn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/search-available.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container my-5 py-4">
    <div class="text-center mb-4"><h1 class="font-serif fw-bold">Đặt bàn</h1>
        <p class="text-secondary-custom">Chọn ngày và sức chứa để tìm bàn phù hợp.</p></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <section class="card custom-card p-4 shadow-sm mb-5">
        <form th:action="@{/customer/reservations/available}" method="get" class="row g-3 align-items-end">
            <div class="col-md-5"><label class="form-label fw-semibold">Ngày đặt bàn</label><input type="date"
                                                                                                   name="date"
                                                                                                   th:value="${date}"
                                                                                                   th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}"
                                                                                                   class="form-control filter-input"
                                                                                                   required></div>
            <div class="col-md-4"><label class="form-label fw-semibold">Sức chứa tối thiểu</label><select
                    name="capacity" class="form-select filter-input">
                <option value="">Tất cả sức chứa</option>
                <option th:each="value : ${#numbers.sequence(2,8,2)}" th:value="${value}"
                        th:selected="${capacity == value}" th:text="${value + ' khách'}"></option>
            </select></div>
            <div class="col-md-3">
                <button class="btn btn-gold-filled w-100 filter-input fw-bold" type="submit"><i
                        class="fa-solid fa-magnifying-glass me-2"></i>Tìm bàn trống
                </button>
            </div>
        </form>
    </section>
    <form th:action="@{/customer/reservations/payment}" method="post" id="bookingForm">
        <input type="hidden" name="date" th:value="${date}">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div><h3 class="font-serif fw-bold mb-1">Danh sách bàn còn trống</h3><span class="text-secondary-custom"
                                                                                       th:text="${'Ngày ' + #temporals.format(date, 'dd/MM/yyyy') + (capacity != null ? ' · Từ ' + capacity + ' khách' : '')}"></span>
            </div>
            <button th:if="${!availableTables.isEmpty()}" type="submit" class="btn btn-gold-filled px-4 py-2">Tiếp tục
                thanh toán <span id="selectedCount" class="badge text-bg-light ms-1">0</span></button>
        </div>
        <div th:if="${availableTables.isEmpty()}" class="custom-card text-center py-5"><i
                class="fa-regular fa-calendar-xmark display-5 text-muted"></i>
            <p class="mt-3 mb-0">Không có bàn phù hợp trong ngày này. Vui lòng chọn ngày hoặc sức chứa khác.</p></div>
        <div class="row g-4 row-cols-1 row-cols-md-3">
            <div class="col" th:each="table : ${availableTables}"><label class="w-100 h-100 table-label"><input
                    type="checkbox" name="tableIds" th:value="${table.tableId}" class="table-check visually-hidden">
                <div class="card custom-card table-card h-100 p-4">
                    <div class="d-flex justify-content-between">
                        <div><h5 class="font-serif fw-bold" th:text="${'Bàn ' + table.tableNumber}"></h5><span
                                class="zone-badge" th:text="${table.area ?: 'Khu vực chính'}"></span></div>
                        <i class="selection-icon fa-regular fa-circle-check fs-4"></i></div>
                    <p class="text-secondary-custom mt-3 mb-0"><i class="fa-solid fa-user-group me-2"></i>Sức chứa:
                        <span th:text="${table.capacity}"></span> khách</p></div>
            </label></div>
        </div>
    </form>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
<script>
    const checks = document.querySelectorAll('.table-check');
    const count = document.getElementById('selectedCount');
    checks.forEach(c => c.addEventListener('change', () => count.textContent = document.querySelectorAll('.table-check:checked').length));
    document.getElementById('bookingForm').addEventListener('submit', e => {
        if (!document.querySelector('.table-check:checked')) {
            e.preventDefault();
            alert('Vui lòng chọn ít nhất một bàn.');
        }
    });</script>
</body>
</html>
