<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>RROMS - Hồ sơ cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container my-5 py-4" style="max-width:850px"><h1 class="font-serif fw-bold mb-1">Hồ sơ của tôi</h1>
    <p class="text-secondary-custom mb-4">Cập nhật thông tin liên hệ để việc đặt bàn thuận tiện hơn.</p>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div class="custom-card p-4 p-md-5">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="avatar-circle d-flex align-items-center justify-content-center text-white fw-bold"
                 th:text="${user.initials}"></div>
            <div><h4 class="mb-0" th:text="${user.fullName}"></h4><span class="text-secondary-custom"
                                                                        th:text="${user.username}"></span></div>
        </div>
        <form th:action="@{/customer/profile}" method="post" th:object="${profileForm}" class="row g-3">
            <div class="col-md-4"><label class="form-label">Họ</label><input class="form-control"
                                                                             th:field="*{firstName}" maxlength="20">
                <div class="text-danger small" th:errors="*{firstName}"></div>
            </div>
            <div class="col-md-4"><label class="form-label">Tên đệm</label><input class="form-control"
                                                                                  th:field="*{middleName}"
                                                                                  maxlength="30">
                <div class="text-danger small" th:errors="*{middleName}"></div>
            </div>
            <div class="col-md-4"><label class="form-label">Tên</label><input class="form-control"
                                                                              th:field="*{lastName}" maxlength="20"
                                                                              required>
                <div class="text-danger small" th:errors="*{lastName}"></div>
            </div>
            <div class="col-md-6"><label class="form-label">Email / tên đăng nhập</label><input class="form-control"
                                                                                                th:value="${user.username}"
                                                                                                disabled>
                <div class="form-text">Không thể thay đổi email đăng nhập tại đây.</div>
            </div>
            <div class="col-md-6"><label class="form-label">Số điện thoại</label><input class="form-control"
                                                                                        th:field="*{phone}" required>
                <div class="text-danger small" th:errors="*{phone}"></div>
            </div>
            <div class="col-12 text-end mt-4">
                <button class="btn btn-gold-filled px-4" type="submit"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu
                    thay đổi
                </button>
            </div>
        </form>
    </div>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
