<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>RROMS - Lịch đặt bàn của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
          rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
</head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>
<main class="container my-5 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h1 class="font-serif fw-bold mb-1">Lịch đặt bàn của tôi</h1>
            <p class="text-secondary-custom mb-0">Theo dõi lịch đặt bàn và trạng thái xác nhận.</p></div>
        <a th:href="@{/customer/reservations/available}" class="btn btn-gold-filled">Đặt bàn mới</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <ul class="nav category-nav gap-4 mb-4 border-bottom flex-nowrap overflow-auto">
        <li class="nav-item"><a class="nav-link text-nowrap" th:classappend="${selectedStatus == null} ? 'active'"
                                th:href="@{/customer/reservations(size=${pageSize})}">Tất cả</a></li>
        <li class="nav-item"><a class="nav-link text-nowrap"
                                th:classappend="${selectedStatus != null && selectedStatus.name() == 'PENDING'} ? 'active'"
                                th:href="@{/customer/reservations(status='PENDING',size=${pageSize})}">Chờ xác nhận</a>
        </li>
        <li class="nav-item"><a class="nav-link text-nowrap"
                                th:classappend="${selectedStatus != null && selectedStatus.name() == 'CONFIRMED'} ? 'active'"
                                th:href="@{/customer/reservations(status='CONFIRMED',size=${pageSize})}">Đã xác nhận</a>
        </li>
        <li class="nav-item"><a class="nav-link text-nowrap"
                                th:classappend="${selectedStatus != null && selectedStatus.name() == 'CHECKED_IN'} ? 'active'"
                                th:href="@{/customer/reservations(status='CHECKED_IN',size=${pageSize})}">Đã nhận
            bàn</a></li>
        <li class="nav-item"><a class="nav-link text-nowrap"
                                th:classappend="${selectedStatus != null && selectedStatus.name() == 'COMPLETED'} ? 'active'"
                                th:href="@{/customer/reservations(status='COMPLETED',size=${pageSize})}">Hoàn thành</a>
        </li>
        <li class="nav-item"><a class="nav-link text-nowrap"
                                th:classappend="${selectedStatus != null && selectedStatus.name() == 'CANCELLED'} ? 'active'"
                                th:href="@{/customer/reservations(status='CANCELLED',size=${pageSize})}">Đã hủy</a></li>
    </ul>

    <div th:if="${reservations.isEmpty()}" class="custom-card text-center p-5">
        <i class="fa-regular fa-calendar display-5 text-muted"></i><h4 class="mt-3">Không có lịch đặt bàn phù hợp</h4>
    </div>

    <div class="row g-4">
        <div class="col-12" th:each="reservation : ${reservations}">
            <article class="custom-card p-4">
                <div class="d-flex flex-wrap justify-content-between gap-3">
                    <div>
                        <span class="badge rounded-pill"
                              th:classappend="${reservation.status.name() == 'PENDING'} ? ' text-bg-warning' : (${reservation.status.name() == 'CONFIRMED'} ? ' text-bg-success' : ' text-bg-secondary')"
                              th:text="${reservation.status.name() == 'PENDING' ? 'Chờ xác nhận' : (reservation.status.name() == 'CONFIRMED' ? 'Đã xác nhận' : (reservation.status.name() == 'CANCELLED' ? 'Đã hủy' : (reservation.status.name() == 'CHECKED_IN' ? 'Đã nhận bàn' : 'Hoàn thành')))}"></span>
                        <h4 class="font-serif fw-bold mt-2 mb-1"
                            th:text="${'Mã đặt bàn #' + reservation.reservationId}"></h4>
                        <div class="text-secondary-custom"
                             th:text="${#temporals.format(reservation.reservationTime,'dd/MM/yyyy')}"></div>
                    </div>
                    <form th:if="${reservation.status.name() == 'PENDING'}"
                          th:action="@{/customer/reservations/{id}/cancel(id=${reservation.reservationId})}"
                          method="post" onsubmit="return confirm('Bạn có chắc muốn hủy lịch đặt bàn này?')">
                        <button class="btn btn-outline-danger" title="Hủy lịch đặt bàn"><i
                                class="fa-solid fa-ban me-1"></i> Hủy
                        </button>
                    </form>
                    <form th:if="${reservation.status.name() == 'CANCELLED'}"
                          th:action="@{/customer/reservations/{id}/delete(id=${reservation.reservationId})}"
                          method="post"
                          onsubmit="return confirm('Xóa vĩnh viễn lịch đặt bàn này? Thao tác này không thể hoàn tác.')">
                        <button class="btn btn-danger" title="Xóa vĩnh viễn"><i class="fa-solid fa-trash-can me-1"></i>
                            Xóa vĩnh viễn
                        </button>
                    </form>
                </div>
                <hr>
                <div class="row g-3">
                    <div class="col-md-4"><small class="text-secondary-custom">CÁC BÀN ĐÃ ĐẶT</small>
                        <div class="fw-semibold"
                             th:text="${#strings.listJoin(reservation.reservationTables.![table.tableNumber],', ')}"></div>
                    </div>
                    <div class="col-md-4"><small class="text-secondary-custom">THÔNG TIN LIÊN HỆ</small>
                        <div th:text="${reservation.fullName}"></div>
                        <div th:text="${reservation.phone}"></div>
                    </div>
                    <div class="col-md-4"><small class="text-secondary-custom">TIỀN CỌC ĐÃ THANH TOÁN</small>
                        <div class="fw-semibold text-gold"
                             th:text="${#numbers.formatDecimal(depositPerTable * reservation.reservationTables.size(),0,'COMMA',0,'POINT') + ' VND'}"></div>
                    </div>
                </div>
                <p th:if="${reservation.note != null && !reservation.note.isBlank()}"
                   class="bg-light rounded p-3 mt-3 mb-0"><b>Ghi chú:</b> <span th:text="${reservation.note}"></span>
                </p>
            </article>
        </div>
    </div>

    <nav class="mt-5" th:if="${totalPages > 1}" aria-label="Phân trang lịch đặt bàn">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'"><a class="page-link"
                                                                                       th:href="@{/customer/reservations(page=${currentPage - 1},size=${pageSize},status=${selectedStatus})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0,totalPages - 1)}"
                th:classappend="${currentPage == i} ? 'active'"><a class="page-link"
                                                                   th:href="@{/customer/reservations(page=${i},size=${pageSize},status=${selectedStatus})}"
                                                                   th:text="${i + 1}"></a></li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'"><a class="page-link"
                                                                                                    th:href="@{/customer/reservations(page=${currentPage + 1},size=${pageSize},status=${selectedStatus})}">Sau</a>
            </li>
        </ul>
    </nav>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
